name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# Push built static files to branch `gh-pages` (matches package.json `deploy` / gh-pages -d dist).
# Repository Pages must stay: Settings → Pages → Build from branch → gh-pages / (root).
permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
